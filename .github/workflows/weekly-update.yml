name: Weekly Data Update

on:
  schedule:
    - cron: '0 0 * * 1' # 매주 월요일 00:00 UTC (한국 시간 오전 9시)
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          
      - name: Install dependencies
        run: |
          cd jocoding-vue
          npm install @google/generative-ai
          
      - name: Update data using Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node jocoding-vue/scripts/update-data.js
          
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add jocoding-vue/src/assets/data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: weekly data update from Gemini API" && git push)
