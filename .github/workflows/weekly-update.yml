name: Weekly Data Update

on:
  # schedule:
  #   - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd dongtan
          npm install

      - name: Update data using Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd dongtan
          node scripts/update-data.js

      - name: Wait for API Quota (Cooldown)
        run: sleep 5

      - name: Update News for D1 using Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WORKER_API_URL: ${{ secrets.WORKER_API_URL }}
          API_SECRET: ${{ secrets.API_SECRET }}
        run: |
          cd dongtan
          node scripts/update-news.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dongtan/src/assets/data.json
          
          if [ -n "$(git status --porcelain dongtan/src/assets/data.json)" ]; then
            git commit -m "auto: weekly data update from Gemini API"
            # 異몃룎 諛⑹??瑜? ?꾪빐 理쒖떊 肄붾뱶瑜? 媛?몄삩 뚮씪 ?쒕줈 ?쒖씠?몃뱶 吏꾪뻾
            git pull origin main --rebase
            git push origin main
          else
            echo "No changes to data.json"
          fi
