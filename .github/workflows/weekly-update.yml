name: Weekly Data Update

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 최신 Node.js 환경 강제 사용
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          
      - name: Install dependencies
        run: |
          cd dongtan
          npm install
          
      - name: List Available Gemini Models
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd dongtan
          node scripts/list-models.js
          
      - name: Update data using Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd dongtan
          node scripts/update-data.js
          
      - name: Update News for D1 using Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WORKER_API_URL: ${{ secrets.WORKER_API_URL }}
          API_SECRET: ${{ secrets.API_SECRET }}
        run: |
          cd dongtan
          node scripts/update-news.js
          
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dongtan/src/assets/data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: weekly data update from Gemini API" && git push)

      - name: Deploy to GitHub Pages
        run: |
          cd dongtan
          npm run deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
