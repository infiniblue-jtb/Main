name: Weekly Data Update

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 최신 Node.js 환경 강제 사용
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          
      - name: Install dependencies
        run: |
          cd jocoding-vue
          npm install @google/generative-ai
          
      - name: Update data using Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd jocoding-vue
          node scripts/update-data.js
          
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add jocoding-vue/src/assets/data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: weekly data update from Gemini API" && git push)
