<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로또 번호 추천</title>
<style>
    :root {
        --bg-gradient: linear-gradient(135deg, #1d2671, #c33764);
        --container-bg: rgba(0,0,0,0.3);
        --text-color: white;
        --ball-bg: white;
        --ball-text: black;
        --input-bg: rgba(255,255,255,0.1);
        --input-border: rgba(255,255,255,0.3);
        --label-color: #ddd;
    }

    [data-theme="light"] {
        --bg-gradient: linear-gradient(135deg, #f5f7fa, #c3cfe2);
        --container-bg: rgba(255,255,255,0.8);
        --text-color: #333;
        --ball-bg: #eee;
        --ball-text: #333;
        --input-bg: rgba(0,0,0,0.05);
        --input-border: rgba(0,0,0,0.1);
        --label-color: #666;
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: var(--bg-gradient);
        color: var(--text-color);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        transition: background 0.3s, color 0.3s;
    }

    .container {
        position: relative;
        text-align: center;
        background: var(--container-bg);
        padding: 40px;
        border-radius: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        width: 90%;
        max-width: 600px;
        margin: 20px;
        transition: background 0.3s;
    }

    /* 상단 컨트롤러 (테마/언어 토글) */
    .top-controls {
        position: absolute;
        top: 20px;
        right: 20px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
    }

    .theme-toggle, .lang-toggle {
        background: none;
        border: 2px solid var(--text-color);
        color: var(--text-color);
        padding: 5px 12px;
        border-radius: 15px;
        cursor: pointer;
        font-size: 13px;
        margin-top: 0;
        transition: all 0.3s;
        white-space: nowrap;
    }

    .theme-toggle:hover, .lang-toggle:hover {
        background: var(--text-color);
        color: var(--container-bg);
        transform: scale(1.05);
    }

    h1 {
        margin-bottom: 10px;
    }

    .set {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin: 10px 0;
    }

    .ball {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        background: var(--ball-bg);
        color: var(--ball-text);
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        font-size: 16px;
        transition: transform 0.3s ease, background 0.3s, color 0.3s;
    }

    .ball:hover {
        transform: scale(1.2);
    }

    button {
        margin-top: 20px;
        padding: 12px 25px;
        border: none;
        border-radius: 25px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        background: linear-gradient(45deg, #ff512f, #dd2476);
        color: white;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.1);
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    /* 제휴 문의 폼 스타일 */
    .contact-form {
        margin-top: 40px;
        padding-top: 30px;
        border-top: 1px solid rgba(128,128,128,0.2);
        text-align: left;
    }

    .contact-form h2 {
        text-align: center;
        margin-bottom: 20px;
        font-size: 1.5rem;
    }

    .form-group {
        margin-bottom: 15px;
    }

    .form-group label {
        display: block;
        margin-bottom: 5px;
        font-size: 0.9rem;
        color: var(--label-color);
    }

    .form-group input, .form-group textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid var(--input-border);
        border-radius: 8px;
        background: var(--input-bg);
        color: var(--text-color);
        box-sizing: border-box;
        transition: background 0.3s, border 0.3s, color 0.3s;
    }

    .form-group textarea {
        height: 80px;
        resize: vertical;
    }

    .submit-btn {
        width: 100%;
        margin-top: 10px;
    }

    /* 댓글 섹션 스타일 */
    .comments-section {
        margin-top: 40px;
        padding-top: 30px;
        border-top: 1px solid rgba(128,128,128,0.2);
    }
</style>
</head>
<body>

<div class="container">
    <div class="top-controls">
        <button class="lang-toggle" onclick="toggleLang()" id="langBtn">🌐 English</button>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌓 모드 변경</button>
    </div>
    <h1 id="title">🎰 로또 5줄 자동 추천</h1>
    <p id="desc">버튼 한 번으로 5세트 생성!</p>

    <!-- 최근 당첨 번호 섹션 추가 -->
    <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; margin: 20px 0;">
        <h3 style="margin-top: 0;" id="recentTitle">🎉 제1220회 당첨번호 (2026-04-18)</h3>
        <div class="set">
            <div class="ball" style="background: #fbc400;">2</div>
            <div class="ball" style="background: #69c8f2;">22</div>
            <div class="ball" style="background: #ff7272;">25</div>
            <div class="ball" style="background: #ff7272;">28</div>
            <div class="ball" style="background: #aaa;">34</div>
            <div class="ball" style="background: #b0d840;">43</div>
            <div style="display: flex; align-items: center; margin: 0 5px; font-weight: bold;">+</div>
            <div class="ball" style="background: #69c8f2;">16</div>
        </div>
    </div>

    <!-- 춤추는 고양이와 돌아다니는 고양이 추가 -->
    <div style="margin: 20px 0; display: flex; justify-content: center; gap: 20px; align-items: center;">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/GeimqsH0TLDt4tScGw/giphy.gif" alt="Dancing Cat" style="width: 150px; border-radius: 10px;">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM2Zic3RyZndmZndmZndmZndmZndmZndmZndmZndmZndmZndmZndmJmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3oriO0OEd9QIDdllqo/giphy.gif" alt="Cute Cat" style="width: 150px; border-radius: 10px;">
    </div>

    <div id="lottoArea"></div>

    <button onclick="generateAll()" id="generateBtn">번호 뽑기</button>

    <!-- 제휴 문의 폼 -->
    <div class="contact-form">
        <h2 id="contactTitle">🤝 제휴 문의</h2>
        <form action="https://formspree.io/f/mrerkyqp" method="POST">
            <div class="form-group">
                <label for="company" id="labelCompany">업체명</label>
                <input type="text" id="company" name="company" required>
            </div>
            <div class="form-group">
                <label for="name" id="labelName">담당자명</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email" id="labelEmail">이메일 주소</label>
                <input type="email" id="email" name="_replyto" required>
            </div>
            <div class="form-group">
                <label for="message" id="labelMessage">문의 내용</label>
                <textarea id="message" name="message" required></textarea>
            </div>
            <input type="text" name="_gotcha" style="display:none">
            <button type="submit" class="submit-btn" id="submitBtn">문의하기</button>
        </form>
    </div>

    <!-- Disqus 댓글 섹션 -->
    <div class="comments-section">
        <div id="disqus_thread"></div>
        <script>
            /**
            *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
            *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
            /*
            var disqus_config = function () {
            this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
            this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
            };
            */
            (function() { // DON'T EDIT BELOW THIS LINE
            var d = document, s = d.createElement('script');
            s.src = 'https://infiniblue.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>
</div>

<script>
function generateSet() {
    let numbers = [];

    while(numbers.length < 6) {
        let num = Math.floor(Math.random() * 45) + 1;
        if(!numbers.includes(num)) numbers.push(num);
    }

    return numbers.sort((a,b)=>a-b);
}

function getColor(num) {
    if (num <= 10) return "#fbc400";
    if (num <= 20) return "#69c8f2";
    if (num <= 30) return "#ff7272";
    if (num <= 40) return "#aaa";
    return "#b0d840";
}

function generateAll() {
    const area = document.getElementById("lottoArea");
    area.innerHTML = "";

    for(let i=0; i<5; i++) {
        let set = generateSet();

        let row = document.createElement("div");
        row.className = "set";

        set.forEach(num => {
            let ball = document.createElement("div");
            ball.className = "ball";
            ball.innerText = num;
            ball.style.background = getColor(num);
            row.appendChild(ball);
        });

        area.appendChild(row);
    }
}

// 테마 토글 로직
function toggleTheme() {
    const currentTheme = document.documentElement.getAttribute('data-theme');
    const targetTheme = currentTheme === 'light' ? 'dark' : 'light';
    
    document.documentElement.setAttribute('data-theme', targetTheme);
    localStorage.setItem('theme', targetTheme);
}

// 초기 테마 설정 로드
(function() {
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
})();

// 언어 설정 및 번역 맵
const translations = {
    ko: {
        langBtn: "🌐 English",
        themeBtn: "🌓 모드 변경",
        title: "🎰 로또 5줄 자동 추천",
        desc: "버튼 한 번으로 5세트 생성!",
        recentTitle: "🎉 제1220회 당첨번호 (2026-04-18)",
        generateBtn: "번호 뽑기",
        contactTitle: "🤝 제휴 문의",
        labelCompany: "업체명",
        labelName: "담당자명",
        labelEmail: "이메일 주소",
        labelMessage: "문의 내용",
        submitBtn: "문의하기"
    },
    en: {
        langBtn: "🌐 한국어",
        themeBtn: "🌓 Toggle Theme",
        title: "🎰 Lotto 5-Row Auto-Recommendation",
        desc: "Generate 5 sets with one click!",
        recentTitle: "🎉 1220th Winning Numbers (2026-04-18)",
        generateBtn: "Generate Numbers",
        contactTitle: "🤝 Affiliate Inquiry",
        labelCompany: "Company Name",
        labelName: "Contact Name",
        labelEmail: "Email Address",
        labelMessage: "Message",
        submitBtn: "Submit"
    }
};

function updateTexts(lang) {
    const map = translations[lang];
    for (let id in map) {
        const el = document.getElementById(id);
        if (el) el.innerText = map[id];
    }
    document.documentElement.lang = lang;
}

function toggleLang() {
    const currentLang = localStorage.getItem('lang') || 'ko';
    const targetLang = currentLang === 'ko' ? 'en' : 'ko';
    
    localStorage.setItem('lang', targetLang);
    updateTexts(targetLang);
}

// 초기 언어 설정 로드
(function() {
    const savedLang = localStorage.getItem('lang') || 'ko';
    updateTexts(savedLang);
})();
</script>

</body>
</html>
