<title id="pageTitle">아이와 오늘 뭐하지? - 서울/경기 TOP 10</title>
<style>
    :root {
        --bg-gradient: linear-gradient(135deg, #fff9e6, #e6f7ff);
        --container-bg: rgba(255, 255, 255, 0.9);
        --text-color: #444;
        --card-bg: white;
        --input-bg: #f9f9f9;
        --input-border: #ddd;
        --label-color: #666;
        --accent-color: #ff9f43;
    }

    [data-theme="dark"] {
        --bg-gradient: linear-gradient(135deg, #2c3e50, #000000);
        --container-bg: rgba(0, 0, 0, 0.7);
        --text-color: #eee;
        --card-bg: #333;
        --input-bg: #444;
        --input-border: #555;
        --label-color: #bbb;
        --accent-color: #f39c12;
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
        background: var(--bg-gradient);
        color: var(--text-color);
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        transition: background 0.3s, color 0.3s;
        padding: 20px 0;
    }

    .container {
        position: relative;
        text-align: center;
        background: var(--container-bg);
        padding: 40px 20px;
        border-radius: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        width: 95%;
        max-width: 800px;
        margin: 0 auto;
        transition: background 0.3s;
    }

    .top-controls {
        position: absolute;
        top: 20px;
        right: 20px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
    }

    .theme-toggle, .lang-toggle {
        background: none;
        border: 2px solid var(--text-color);
        color: var(--text-color);
        padding: 5px 12px;
        border-radius: 15px;
        cursor: pointer;
        font-size: 13px;
        transition: all 0.3s;
        white-space: nowrap;
    }

    .theme-toggle:hover, .lang-toggle:hover {
        background: var(--text-color);
        color: var(--container-bg);
        transform: scale(1.05);
    }

    h1 {
        margin-bottom: 10px;
        color: var(--accent-color);
    }

    p#desc {
        margin-bottom: 30px;
        font-size: 1.1rem;
    }

    /* 지도 스타일 */
    #map {
        width: 100%;
        height: 400px;
        border-radius: 15px;
        margin-bottom: 30px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        background: #eee;
    }

    /* 명소 리스트 스타일 */
    .spots-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        text-align: left;
    }

    .spot-card {
        background: var(--card-bg);
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        transition: transform 0.3s;
        border: 1px solid var(--input-border);
    }

    .spot-card:hover {
        transform: translateY(-5px);
    }

    .spot-card h3 {
        margin-top: 0;
        margin-bottom: 10px;
        color: var(--accent-color);
    }

    .spot-info {
        font-size: 0.9rem;
        margin-bottom: 5px;
    }

    .spot-price {
        font-weight: bold;
        color: #e74c3c;
    }

    /* 제휴 문의 폼 스타일 */
    .contact-form {
        margin-top: 50px;
        padding-top: 30px;
        border-top: 1px solid var(--input-border);
        text-align: left;
    }

    .contact-form h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .form-group {
        margin-bottom: 15px;
    }

    .form-group label {
        display: block;
        margin-bottom: 5px;
        font-size: 0.9rem;
        color: var(--label-color);
    }

    .form-group input, .form-group textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--input-border);
        border-radius: 8px;
        background: var(--input-bg);
        color: var(--text-color);
        box-sizing: border-box;
    }

    .submit-btn {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 25px;
        background: var(--accent-color);
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .submit-btn:hover {
        opacity: 0.9;
        transform: scale(1.02);
    }

    .comments-section {
        margin-top: 50px;
        padding-top: 30px;
        border-top: 1px solid var(--input-border);
    }
</style>
</head>

            <button type="submit" class="submit-btn" id="submitBtn">보내기</button>
        </form>
    </div>

    <!-- Disqus 댓글 -->

let map;
let markers = [];

function initMap() {
    console.log("카카오 지도 초기화 시도 중...");
    const container = document.getElementById('map');
    
    if (typeof kakao === 'undefined') {
        console.error("카카오 지도 SDK가 로드되지 않았습니다. API 키나 도메인 설정을 확인하세요.");
        container.innerHTML = "<div style='padding:20px; color:red;'>카카오 지도 SDK 로드 실패. API 키와 도메인 설정을 확인해주세요.</div>";
        return;
    }

    if (!kakao.maps || !kakao.maps.LatLng) {
        console.warn("카카오 지도 객체가 아직 준비되지 않았습니다. 0.5초 후 재시도합니다.");
        setTimeout(initMap, 500);
        return;
    }

    try {
        const options = {
            center: new kakao.maps.LatLng(37.5665, 126.9780), // 서울 시청 기준
            level: 9
        };

        map = new kakao.maps.Map(container, options);
        console.log("카카오 지도 생성 성공!");
        renderSpots();
    } catch (e) {
        console.error("지도 생성 중 오류 발생:", e);
        container.innerHTML = "<div style='padding:20px; color:red;'>지도 생성 중 오류가 발생했습니다: " + e.message + "</div>";
    }
}

function renderSpots() {
    const lang = localStorage.getItem('lang') || 'ko';
    const list = document.getElementById('spotsList');
    list.innerHTML = "";

    PLACES_DATA.forEach(spot => {
        // 리스트 카드 생성
        const card = document.createElement('div');
        card.className = "spot-card";
        card.innerHTML = `
            <h3>${lang === 'ko' ? spot.name : spot.name_en}</h3>
            <p class="spot-info"><strong>${translations[lang].addrLabel}</strong> ${lang === 'ko' ? spot.address : spot.address_en}</p>
            <p class="spot-info"><strong>${translations[lang].priceLabel}</strong> <span class="spot-price">${lang === 'ko' ? spot.price : spot.price_en}</span></p>
            <p class="spot-info">${lang === 'ko' ? spot.desc : spot.desc_en}</p>
        `;
        list.appendChild(card);

        // 지도 마커 표시
        if (map) {
            const markerPosition = new kakao.maps.LatLng(spot.lat, spot.lng);
            const marker = new kakao.maps.Marker({
                position: markerPosition,
                map: map,
                title: lang === 'ko' ? spot.name : spot.name_en
            });
            markers.push(marker);

            const infowindow = new kakao.maps.InfoWindow({
                content: `<div style="padding:10px; color:#333; font-size:12px; width:150px;">
                            <strong>${lang === 'ko' ? spot.name : spot.name_en}</strong><br>
                            ${lang === 'ko' ? spot.price : spot.price_en}
                          </div>`
            });

            kakao.maps.event.addListener(marker, 'click', function() {
                infowindow.open(map, marker);
            });
        }
    });
}

function updateTexts(lang) {
    const mapTexts = translations[lang];
    document.getElementById('pageTitle').innerText = mapTexts.pageTitle;
    document.getElementById('langBtn').innerText = mapTexts.langBtn;
    document.getElementById('themeBtn').innerText = mapTexts.themeBtn;
    document.getElementById('title').innerText = mapTexts.title;
    document.getElementById('desc').innerText = mapTexts.desc;
    document.getElementById('contactTitle').innerText = mapTexts.contactTitle;
    document.getElementById('labelCompany').innerText = mapTexts.labelCompany;
    document.getElementById('labelEmail').innerText = mapTexts.labelEmail;
    document.getElementById('labelMessage').innerText = mapTexts.labelMessage;
    document.getElementById('submitBtn').innerText = mapTexts.submitBtn;
    
    document.documentElement.lang = lang;
    renderSpots();
}

function toggleLang() {
    const currentLang = localStorage.getItem('lang') || 'ko';
    const targetLang = currentLang === 'ko' ? 'en' : 'ko';
    localStorage.setItem('lang', targetLang);
    updateTexts(targetLang);
}

function toggleTheme() {
    const currentTheme = document.documentElement.getAttribute('data-theme');
    const targetTheme = currentTheme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', targetTheme);
    localStorage.setItem('theme', targetTheme);
}

// 초기 로드
window.onload = function() {
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    
    const savedLang = localStorage.getItem('lang') || 'ko';
    updateTexts(savedLang);
    
    initMap();
};
