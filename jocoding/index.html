<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로또 번호 추천</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #1d2671, #c33764);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .container {
        text-align: center;
        background: rgba(0,0,0,0.3);
        padding: 40px;
        border-radius: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        width: 90%;
        max-width: 600px;
    }

    h1 {
        margin-bottom: 10px;
    }

    .set {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin: 10px 0;
    }

    .ball {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        background: white;
        color: black;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        font-size: 16px;
        transition: transform 0.3s ease;
    }

    .ball:hover {
        transform: scale(1.2);
    }

    button {
        margin-top: 20px;
        padding: 12px 25px;
        border: none;
        border-radius: 25px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        background: linear-gradient(45deg, #ff512f, #dd2476);
        color: white;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.1);
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    /* 제휴 문의 폼 스타일 */
    .contact-form {
        margin-top: 40px;
        padding-top: 30px;
        border-top: 1px solid rgba(255,255,255,0.2);
        text-align: left;
    }

    .contact-form h2 {
        text-align: center;
        margin-bottom: 20px;
        font-size: 1.5rem;
    }

    .form-group {
        margin-bottom: 15px;
    }

    .form-group label {
        display: block;
        margin-bottom: 5px;
        font-size: 0.9rem;
        color: #ddd;
    }

    .form-group input, .form-group textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid rgba(255,255,255,0.3);
        border-radius: 8px;
        background: rgba(255,255,255,0.1);
        color: white;
        box-sizing: border-box;
    }

    .form-group textarea {
        height: 80px;
        resize: vertical;
    }

    .submit-btn {
        width: 100%;
        margin-top: 10px;
    }
</style>
</head>
<body>

<div class="container">
    <h1>🎰 로또 5줄 자동 추천</h1>
    <p>버튼 한 번으로 5세트 생성!</p>

    <!-- 최근 당첨 번호 섹션 추가 -->
    <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; margin: 20px 0;">
        <h3 style="margin-top: 0;">🎉 제1220회 당첨번호 (2026-04-18)</h3>
        <div class="set">
            <div class="ball" style="background: #fbc400;">2</div>
            <div class="ball" style="background: #69c8f2;">22</div>
            <div class="ball" style="background: #ff7272;">25</div>
            <div class="ball" style="background: #ff7272;">28</div>
            <div class="ball" style="background: #aaa;">34</div>
            <div class="ball" style="background: #b0d840;">43</div>
            <div style="display: flex; align-items: center; margin: 0 5px; font-weight: bold;">+</div>
            <div class="ball" style="background: #69c8f2;">16</div>
        </div>
    </div>

    <!-- 춤추는 고양이와 돌아다니는 고양이 추가 -->
    <div style="margin: 20px 0; display: flex; justify-content: center; gap: 20px; align-items: center;">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/GeimqsH0TLDt4tScGw/giphy.gif" alt="Dancing Cat" style="width: 150px; border-radius: 10px;">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMHZueGZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3bmZ3JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/mlvseq9nOepH2/giphy.gif" alt="Walking Cat" style="width: 150px; border-radius: 10px;">
    </div>

    <div id="lottoArea"></div>

    <button onclick="generateAll()">번호 뽑기</button>

    <!-- 제휴 문의 폼 -->
    <div class="contact-form">
        <h2>🤝 제휴 문의</h2>
        <form action="https://formspree.io/f/mrerkyqp" method="POST">
            <div class="form-group">
                <label for="company">업체명</label>
                <input type="text" id="company" name="company" required>
            </div>
            <div class="form-group">
                <label for="name">담당자명</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="_replyto" required>
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" required></textarea>
            </div>
            <input type="text" name="_gotcha" style="display:none">
            <button type="submit" class="submit-btn">문의하기</button>
        </form>
    </div>
</div>

<script>
function generateSet() {
    let numbers = [];

    while(numbers.length < 6) {
        let num = Math.floor(Math.random() * 45) + 1;
        if(!numbers.includes(num)) numbers.push(num);
    }

    return numbers.sort((a,b)=>a-b);
}

function getColor(num) {
    if (num <= 10) return "#fbc400";
    if (num <= 20) return "#69c8f2";
    if (num <= 30) return "#ff7272";
    if (num <= 40) return "#aaa";
    return "#b0d840";
}

function generateAll() {
    const area = document.getElementById("lottoArea");
    area.innerHTML = "";

    for(let i=0; i<5; i++) {
        let set = generateSet();

        let row = document.createElement("div");
        row.className = "set";

        set.forEach(num => {
            let ball = document.createElement("div");
            ball.className = "ball";
            ball.innerText = num;
            ball.style.background = getColor(num);
            row.appendChild(ball);
        });

        area.appendChild(row);
    }
}
</script>

</body>
</html>
