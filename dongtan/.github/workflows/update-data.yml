name: Weekly Data and News Update

on:
  schedule:
    - cron: '0 0 * * 1' # Every Monday at 00:00 UTC
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run data update script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/update-data.js

      - name: Run news update script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WORKER_API_URL: ${{ secrets.WORKER_API_URL }}
          API_SECRET: ${{ secrets.API_SECRET }}
        run: node scripts/update-news.js

      - name: Commit and push if data.json changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/assets/data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automatic data update [skip ci]" && git push)
